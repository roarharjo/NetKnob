[env:knob]
platform = espressif32@6.6.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
upload_port = COM9
monitor_port = COM9
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLV_CONF_SKIP=1
    -DLV_COLOR_DEPTH=16
    -DLV_COLOR_16_SWAP=1
    -DLV_FONT_MONTSERRAT_12=1
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_16=1
    -DLV_FONT_MONTSERRAT_20=1
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_USE_LOG=0
    -DLV_USE_SYSMON=0
    -DLV_USE_PERF_MONITOR=0
    -DLV_USE_MEM_MONITOR=0
    -DLV_USE_OBSERVER=1
    -DLV_USE_ASSERT_NULL=0
    -DLV_USE_ASSERT_MALLOC=0
    -DLV_USE_ASSERT_OBJ=0
    -DLV_USE_ASSERT_STYLE=0
    -DLV_USE_DEMO_WIDGETS=0
    -DLV_USE_DEMO_BENCHMARK=0
    -DLV_USE_DEMO_STRESS=0
    -DLV_USE_DEMO_MUSIC=0
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=1
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=0
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=0
    -DCONFIG_BT_NIMBLE_TASK_STACK_SIZE=8192
lib_deps =
    lvgl/lvgl@~9.2.0
    h2zero/NimBLE-Arduino@^1.4.0
